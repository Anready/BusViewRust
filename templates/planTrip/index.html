<script>
    document.getElementById('tripDate').min = new Date().toISOString().split('T')[0];
    document.getElementById('tripTime').value = new Date().toTimeString().slice(0,5);

    const dateInput = document.getElementById('tripDate');
    const dateWrapper = dateInput.parentElement;

    dateInput.value = (new Date()).toISOString().split("T")[0];

    dateWrapper.addEventListener('click', (e) => {
        e.preventDefault();
        try {
            dateInput.showPicker();
        } catch (error) {
            dateInput.focus();
        }
    });

    const timeInput = document.getElementById('tripTime');
    const timeWrapper = timeInput.parentElement;

    timeWrapper.addEventListener('click', (e) => {
        e.preventDefault();
        try {
            timeInput.showPicker();
        } catch (error) {
            timeInput.focus();
        }
    });

    function swapStops() {
        const startInput = document.getElementById('start');
        const endInput = document.getElementById('end');
        const startIdInput = document.getElementById('startId');
        const endIdInput = document.getElementById('endId');
        const startLocationInfo = document.getElementById('startLocationInfo');
        const endLocationInfo = document.getElementById('endLocationInfo');

        const tempText = startInput.value;
        const tempId = startIdInput.value;
        const tempInfo = startLocationInfo.innerHTML;
        const tempLat = startInput.dataset.selectedLat;
        const tempLng = startInput.dataset.selectedLng;

        startInput.value = endInput.value;
        startIdInput.value = endIdInput.value;
        startLocationInfo.innerHTML = endLocationInfo.innerHTML;
        startInput.dataset.selectedLat = endInput.dataset.selectedLat;
        startInput.dataset.selectedLng = endInput.dataset.selectedLng;

        endInput.value = tempText;
        endIdInput.value = tempId;
        endLocationInfo.innerHTML = tempInfo;
        endInput.dataset.selectedLat = tempLat;
        endInput.dataset.selectedLng = tempLng;

        saveFieldState();
    }
</script>

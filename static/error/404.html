<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>404 Not Found</title>
    <link rel="preload" as="image" href="/static/icons/cat.png">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-JVG08NJ1BD"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());

        gtag('config', 'G-JVG08NJ1BD');
    </script>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    .app {
        position: relative;
        height: 100svh;
        background: #ffffff;
        overflow: hidden;
        font-family: "Montserrat", sans-serif;
        color: #000000;
        font-size: 18px;
    }

    .img {
        position: absolute;
        bottom: 0;
        max-width: 1920px;
        margin: 0 auto;
        animation: catAnim 1.5s ease forwards;
    }

    .img img{
        display: flex;
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .okak{
        position: absolute;
        bottom: 0;
        left: 50%;
        color: #fff;
        translate: -50% 0;
        font-weight: 900;
        font-size: 115px;
    }

    .error{
        position: absolute;
        top: 50%;
        left: 50%;
        font-size: 50vw;
        font-weight: 900;
        transform: translate(-50%, 880px);
        animation: errorAnim 1.5s ease forwards;
    }

    @keyframes catAnim {
        0% {
            translate: 0 50%;
        }
        100% {
            translate: 0 0;
        }
    }

    @keyframes errorAnim {
        100% {
            transform: translate(-50%, -40vw);
        }
    }
</style>
<body>
<div class="app">
    <div class="error">
        404
    </div>
    <div class="img">
        <img src="/static/icons/cat.png" alt="cat">
        <h1 class="okak">OKAK</h1>
    </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>403 — Access Denied</title>
  <style>
    body {
      background-color: #0f0f0f;
      color: #e0e0e0;
      font-family: "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    h1 {
      font-size: 6rem;
      margin: 0;
      color: #ff4c4c;
    }

    h2 {
      margin-top: 0.5rem;
      font-weight: 400;
      color: #cccccc;
    }

    p {
      color: #888;
      margin-top: 2rem;
      max-width: 400px;
      text-align: center;
    }

    .btn {
      margin-top: 2rem;
      padding: 0.75rem 2rem;
      border: none;
      background: #1f1f1f;
      color: #e0e0e0;
      font-size: 1rem;
      cursor: pointer;
      border-radius: 6px;
      transition: background 0.3s;
    }

    .btn:hover {
      background: #292929;
    }

    .code-box {
      background: #1a1a1a;
      padding: 0.5rem 1rem;
      border-radius: 5px;
      margin-top: 1rem;
      color: #ff4c4c;
      font-family: monospace;
    }
  </style>
</head>
<body>
<h1>403</h1>
<h2>Access Denied</h2>
<div class="code-box">error code: 403_forbidden</div>
<p>You don't have permission to access this resource.<br>If you believe this is a mistake, please contact the site administrator.</p>
<button class="btn" onclick="location.href='/'">Return Home</button>
</body>
</html>
